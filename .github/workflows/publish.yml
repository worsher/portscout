name: Publish to npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm smoke

  publish:
    needs: test-linux
    runs-on: macos-latest # smoke 测试依赖 lsof/ps/launchctl 真实环境
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: 校验 tag 与 package.json 版本一致
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag v${TAG_VERSION} 与 package.json 版本 ${PKG_VERSION} 不一致" >&2
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - run: pnpm smoke

      - name: Publish with npm Trusted Publishing
        run: npm publish
