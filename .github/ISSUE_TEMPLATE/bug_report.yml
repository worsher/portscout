name: Bug report
description: Report a reproducible PortMarshal failure or incorrect CLI behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please redact secrets and private command arguments before submitting.
  - type: input
    id: version
    attributes:
      label: PortMarshal version
      description: Run `portmarshal --version`.
      placeholder: 0.3.2
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other or unsupported
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: Operating system version
      placeholder: macOS 15.5 or Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Run `node --version`.
      placeholder: v22.17.0
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Include the smallest sequence of commands that consistently reproduces the problem.
      placeholder: |
        1. Start a listener with ...
        2. Run portmarshal ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and output
      description: Paste complete relevant output, with sensitive paths and arguments redacted.
      render: shell
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add logs, screenshots, shell details, or other context that may help.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checklist
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed secrets and unnecessary private information from the report.
          required: true
