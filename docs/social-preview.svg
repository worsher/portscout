<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="left-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#11111b" stop-opacity="0.98"/>
      <stop offset="0.54" stop-color="#11111b" stop-opacity="0.90"/>
      <stop offset="0.72" stop-color="#11111b" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#11111b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd6f4"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="#11111b"/>
  <image href="social-preview-art.jpg" width="1280" height="640" preserveAspectRatio="none"/>
  <rect width="920" height="640" fill="url(#left-shade)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, sans-serif">
    <text x="72" y="96" fill="#89dceb" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace"
      font-size="18" font-weight="700" letter-spacing="2.4">OPEN-SOURCE CLI · MACOS + LINUX</text>

    <text x="68" y="190" fill="url(#title)" font-size="82" font-weight="760" letter-spacing="-3"
      filter="url(#soft-shadow)">PortMarshal</text>

    <rect x="72" y="231" width="6" height="87" rx="3" fill="#89dceb"/>
    <text x="100" y="266" fill="#cdd6f4" font-size="34" font-weight="620" letter-spacing="-0.5">
      <tspan x="100" dy="0">Know which agent owns</tspan>
      <tspan x="100" dy="46">every local dev server.</tspan>
    </text>

    <text x="73" y="375" fill="#a6adc8" font-size="20" font-weight="540" letter-spacing="0.15">
      Port attribution  ·  Sticky claims  ·  Guarded stop
    </text>

    <g filter="url(#soft-shadow)">
      <rect x="72" y="430" width="418" height="72" rx="14" fill="#181825" fill-opacity="0.96"
        stroke="#45475a" stroke-width="2"/>
      <circle cx="102" cy="466" r="5" fill="#f38ba8"/>
      <circle cx="120" cy="466" r="5" fill="#f9e2af"/>
      <circle cx="138" cy="466" r="5" fill="#a6e3a1"/>
      <text x="164" y="474" fill="#94e2d5" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace"
        font-size="21" font-weight="600">$ portmarshal whois 3000</text>
    </g>

    <text x="73" y="562" fill="#6c7086" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace"
      font-size="17" font-weight="600">github.com/worsher/portmarshal</text>
  </g>
</svg>
